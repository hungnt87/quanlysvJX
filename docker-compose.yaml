services:
  goddess:
    build:
      context: ./dockerfiles
      dockerfile: Dockerfile.jx-centos
      args:
        APP_WORKDIR: /src/jxser/gateway/
        APP_CMD: goddess_y
    image: goddess
    container_name: goddess
    restart: no
    tty: true
    volumes:
      - "${SERVER_PATH}/gateway:/src/jxser/gateway/"
      - "./settings/gateway/goddess.cfg:/src/jxser/gateway/goddess.cfg"
    network_mode: host
    depends_on:
      s3relayserver:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "bash -ec '</dev/tcp/127.0.0.1/5001'"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 5s
  bishop:
    build:
      context: ./dockerfiles
      dockerfile: Dockerfile.jx-centos
      args:
        APP_WORKDIR: /src/jxser/gateway/
        APP_CMD: bishop_y
    image: bishop
    container_name: bishop
    restart: no
    tty: true
    volumes:
      - "${SERVER_PATH}/gateway:/src/jxser/gateway/"
      - "./settings/gateway/bishop.cfg:/src/jxser/gateway/bishop.cfg"
    network_mode: host
    depends_on:
      goddess:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "bash -ec '</dev/tcp/127.0.0.1/5622' && bash -ec '</dev/tcp/127.0.0.1/5632'"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 5s
  s3relay:
    build:
      context: ./dockerfiles
      dockerfile: Dockerfile.jx-centos
      args:
        APP_WORKDIR: /src/jxser/gateway/s3relay/
        APP_CMD: s3relay_y
    image: s3relay
    container_name: s3relay
    restart: no
    tty: true
    volumes:
      - "${SERVER_PATH}/gateway:/src/jxser/gateway/"
      - "./settings/gateway/relay_config.ini:/src/jxser/gateway/s3relay/relay_config.ini"
      - "./settings/gateway/hostset.ini:/src/jxser/gateway/s3relay/settings/hostset.ini"
      - ./logs/gateway/Logs:/src/jxser/gateway/Logs
      - ./logs/gateway/Backup:/src/jxser/gateway/Backup
      - ./logs/gateway/roleback:/src/jxser/gateway/roleback
      - ./logs/gateway/rolevalue_setting/rolevalue_log:/src/jxser/gateway/rolevalue_setting/rolevalue_log
      - ./logs/gateway/s3relay/Logs:/src/jxser/gateway/s3relay/Logs
      - ./logs/gateway/s3relay/relay_logs:/src/jxser/gateway/s3relay/relay_logs
      - ./logs/gateway/s3relay/RelayRunData:/src/jxser/gateway/s3relay/RelayRunData
    network_mode: host
    depends_on:
      bishop:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "sleep 10; kill -0 1"]
      interval: 10s
      timeout: 12s
      retries: 12
      start_period: 5s
  jx_linux:
    build:
      context: ./dockerfiles
      dockerfile: Dockerfile.jx-centos
      args:
        APP_WORKDIR: /src/jxser/server1/
        APP_CMD: jx_linux_y
    image: jx_linux
    container_name: jx_linux
    restart: no
    tty: true
    volumes:
      - "${SERVER_PATH}/server1:/src/jxser/server1/"
      - "./settings/gs1/servercf0.ini:/src/jxser/server1/servercf0.ini"
      - ./logs/server1/Logs:/src/jxser/server1/Logs
      - ./logs/server1/itemexchange_setting/rolevalue_log:/src/jxser/server1/itemexchange_setting/rolevalue_log
      - "./script/camnangvozer.lua:/src/jxser/server1/script/global/mel/item/camnangvozer.lua"
      - "./script/configserver.lua:/src/jxser/server1/script/global/mel/configserver.lua"
      - "./settings/npcs.txt:/src/jxser/server1/settings/npcs.txt"
    network_mode: host
    depends_on:
      s3relay:
        condition: service_healthy

  paysys:
    build:
      context: .
      dockerfile: dockerfiles/Dockerfile.paysys
    image: paysys
    container_name: paysys
    restart: no
    tty: true
    ipc: host
    environment:
      - DISPLAY=:99
    volumes:
      - "./paysyswin:/src/paysys"
    network_mode: host
    healthcheck:
      test: ["CMD-SHELL", "bash -ec '</dev/tcp/127.0.0.1/5002'"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 5s

  s3relayserver:
    image: paysys
    container_name: s3relayserver
    restart: no
    tty: true
    ipc: host
    environment:
      - DISPLAY=:98
    volumes:
      - "./paysyswin:/src/paysys"
    network_mode: host
    depends_on:
      paysys:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "bash -ec '</dev/tcp/127.0.0.1/7777'"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 5s
    command: [ "s3relay-entrypoint.sh" ]
