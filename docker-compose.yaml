name: quanlysvjx-manager

x-manager-host-root: &manager-host-root ${MANAGER_PROJECT_ROOT:-${PWD}}

services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    env_file: .env
    environment:
      COMPOSE_PROJECT_NAME: quanlysvjx
      MANAGER_API_HOST: 0.0.0.0
      MANAGER_API_PORT: 3001
      MANAGER_PROJECT_ROOT: *manager-host-root
    volumes:
      - type: bind
        source: *manager-host-root
        target: *manager-host-root
      - /var/run/docker.sock:/var/run/docker.sock
      - /proc:/host/proc:ro
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    privileged: true
    networks:
      - manager-net
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  ui:
    build:
      context: .
      dockerfile: apps/ui/Dockerfile
    ports:
      - "${MANAGER_HTTP_BIND:-0.0.0.0}:${MANAGER_HTTP_PORT:-80}:80"
    depends_on:
      - api
    networks:
      - manager-net
    restart: unless-stopped

networks:
  manager-net:
    driver: bridge
